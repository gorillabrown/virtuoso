name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip openpyxl pytest
      - name: Structural validation
        run: python plugins/virtuoso/scripts/validate.py
      - name: Version sync check
        run: python plugins/virtuoso/scripts/bump_version.py --check
      - name: Tests
        run: python -m pytest plugins/virtuoso/skills/roadmap-review/scripts/test_recalc.py plugins/virtuoso/scripts/test_virtuoso_preflight.py -q
